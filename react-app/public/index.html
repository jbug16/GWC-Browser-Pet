<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="stylesheet" href="./index.css"/>
    
    <title>Browser Pet Timer</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <div class="div">
      <label id="enterTime">TIMER</label>
      <br/> <br/>
      <h1 id="Time">0:0:00</h1>
      <br/>
      <button id="increaseMin" class="buttons">+10 Minutes</button>
      <button id="increaseSec" class="buttons">+10 Seconds</button>
      <button id="increaseHr" class="buttons">+1 Hour</button>
      <br/><br/>
      <button id="startTimer" class="buttons">Start</button>
      <button id="pauseReset" class="buttons">Pause/Reset</button>
      <button id="Stop" class="buttons">Stop</button>
      <br/><br/>
      <button id="toDo">ToDo</button>
    </div>
   <script src="index.js"></script>
  </body>
</html>
